# siprec-stack Helm chart defaults
# Override with: helm install siprec-stack ./helm -f my-values.yaml

namespaceOverride: ""

# Each entry renders an independent one-replica Deployment, ConfigMap, PVC,
# and internal passthrough LoadBalancer Service. Add entries to scale the
# recorder pool; do not scale an individual recorder Deployment.
siprecRecorder:
  image:
    repository: us-central1-docker.pkg.dev/div-deai-cx-dev-usc1-ri/cx-sip/cx-streamlink-rec
    tag: "dev"
    pullPolicy: Always

  instances:
    - name: recorder-1
      loadBalancerIP: "100.73.16.54"
    - name: recorder-2
      loadBalancerIP: "100.73.16.64"

  # Optional recorder-pool placement. This does not pin an instance to a
  # hostname, so multiple recorder pods can share a sufficiently large node.
  nodeSelector:
    siprec-role: recorder

  tolerations:
    - key: siprec-role
      operator: Equal
      value: recorder
      effect: NoSchedule

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  strategy:
    type: Recreate

  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    # Empty uses the cluster's default StorageClass.
    storageClassName: ""

  service:
    type: LoadBalancer
    port: 5060
    # Leave empty to use the annotation on older GKE versions. On supported
    # clusters set networking.gke.io/l4-regional-internal.
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations:
      networking.gke.io/load-balancer-type: "Internal"

  gcp:
    workloadIdentity:
      gcpServiceAccount: "adtgcp-ccs-dev-insight-sa@adtgcp-ent-dev-ccs-tlcm-fe10.iam.gserviceaccount.com"

    credentialsSecret:
      name: ""
      key: "key.json"

  config:
    sipListenAddr: "0.0.0.0:5060"
    # The recorder allocates even RTP ports. The chart exposes every even port
    # in this inclusive range. At most 99 RTP ports are allowed because GKE
    # supports at most 100 Service ports including SIP/5060.
    rtpPortStart: 10000
    rtpPortEnd: 30000
    recordingDir: "/app/recordings"
    gcsBucket: "cx-siprec-audio-raw"
    gcsObjectPrefix: "rec"
    gcsMetadataBucket: "cx-siprec-metadata"
    gcsMetadataObjectPrefix: "metadata"
    deleteAfterUpload: true
    uploadWorkers: 4
    uploadMaxRetries: 5
    uploadSweepIntervalSec: 60
    shutdownUploadTimeoutSec: 30

# Stateless SIPREC signaling proxy. Its dispatcher destinations are generated
# from siprecRecorder.instances and use the recorder Service cluster DNS names.
kamailio:
  image:
    repository: ghcr.io/kamailio/kamailio
    tag: "6.0.7-bookworm"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  service:
    type: LoadBalancer
    port: 5060
    loadBalancerIP: "100.73.16.5"
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations:
      networking.gke.io/load-balancer-type: "Internal"

  config:
    debug: 2
    children: 4
    dispatcherPingInterval: 10
