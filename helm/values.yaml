# cx-streamlink Helm chart defaults
# Override with: helm install streamlink ./helm -f my-values.yaml

namespaceOverride: ""

# Each entry renders an independent one-replica Deployment, ConfigMap, PVC,
# and internal passthrough LoadBalancer Service. Add entries to scale the
# recorder pool; do not scale an individual recorder Deployment.
recorder:
  image:
    repository: us-central1-docker.pkg.dev/div-deai-cx-dev-usc1-ri/cx-sip/cx-streamlink-rec
    tag: "dev"
    pullPolicy: Always

  instances:
    - name: recorder-1
      loadBalancerIP: "100.73.23.145"
      sipPort: 5060
    - name: recorder-2
      loadBalancerIP: "100.73.23.146"
      sipPort: 5061

  # Recorder pods share the node network namespace. SIP ports must be unique
  # per instance; dynamically allocated RTP ports share one node-wide pool.
  hostNetwork: true
  coLocateOnSameNode: true

  # Schedule recorder pods only on c2-standard-4 nodes.
  nodeSelector:
    node.kubernetes.io/instance-type: c2-standard-4

  tolerations: []

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  strategy:
    type: Recreate

  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    # Empty uses the cluster's default StorageClass.
    storageClassName: ""

  service:
    type: LoadBalancer
    port: 5060
    # Leave empty to use the annotation on older GKE versions. On supported
    # clusters set networking.gke.io/l4-regional-internal.
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations:
      networking.gke.io/load-balancer-type: "Internal"

  gcp:
    workloadIdentity:
      gcpServiceAccount: "adtgcp-ccs-tst-insight-sa@adtgcp-ent-tst-ccs-tlcm-8143.iam.gserviceaccount.com"

    credentialsSecret:
      name: ""
      key: "key.json"

  config:
    sipListenIP: "0.0.0.0"
    # The recorder allocates even RTP ports from this node-wide shared range.
    # Recorder Services declare enough ports to make GKE use an all-ports
    # forwarding rule; a separate firewall rule must allow this full range.
    rtpPortStart: 10000
    rtpPortEnd: 30000
    recordingDir: "/app/recordings"
    gcsBucket: "cx-siprec-audio-raw-uat"
    gcsObjectPrefix: "rec"
    gcsMetadataBucket: "cx-siprec-metadata-uat"
    gcsMetadataObjectPrefix: "metadata"
    deleteAfterUpload: true
    uploadWorkers: 4
    uploadMaxRetries: 5
    uploadSweepIntervalSec: 60
    shutdownUploadTimeoutSec: 30

# Stateless signaling proxy. Its dispatcher destinations are generated from
# recorder.instances and use the recorder Service cluster DNS names.
proxy:
  image:
    repository: us-central1-docker.pkg.dev/div-deai-cx-dev-usc1-ri/cx-sip/cx-streamlink-proxy
    tag: "dev"
    pullPolicy: Always

  replicaCount: 2

  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  service:
    type: LoadBalancer
    port: 5060
    loadBalancerIP: "100.73.23.134"
    loadBalancerClass: ""
    loadBalancerSourceRanges: []
    annotations:
      networking.gke.io/load-balancer-type: "Internal"

  config:
    debug: 2
    children: 4
    dispatcherPingInterval: 10
