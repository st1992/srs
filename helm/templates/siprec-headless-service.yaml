apiVersion: v1
kind: Service
metadata:
  name: {{ include "siprec.headlessServiceName" . }}
  namespace: {{ include "siprec-stack.namespace" . }}
  labels:
    {{- include "siprec.labels" . | nindent 4 }}
  annotations:
    # This Service is intentionally headless (clusterIP: None).
    # Kubernetes DNS returns an A record for every ready DaemonSet pod IP,
    # which the Kamailio init-container resolves with `dig` to build the
    # dispatcher.list that Kamailio uses for round-robin load balancing.
    #
    # DNS name used by the init-container:
    #   {{ include "siprec.headlessServiceName" . }}.{{ include "siprec-stack.namespace" . }}.svc.cluster.local
    siprec-stack/purpose: "kamailio-dispatcher-dns-discovery"
spec:
  # clusterIP: None makes this a headless Service.
  # CoreDNS returns individual pod IPs instead of a single virtual IP.
  clusterIP: None

  # publishNotReadyAddresses: false (default) — only healthy pods are returned
  # by DNS, preventing Kamailio from dispatching calls to a recorder that is
  # still initializing or draining.
  publishNotReadyAddresses: false

  selector:
    {{- include "siprec.selectorLabels" . | nindent 4 }}

  ports:
    - name: sip-udp
      port: 5060
      targetPort: sip-udp
      protocol: UDP
