{{- $root := . }}
{{ range $index, $instance := $root.Values.siprecRecorder.instances }}
{{ $instanceCtx := dict "root" $root "instance" $instance }}
{{ if $index }}
---
{{ end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "siprec.instanceFullname" $instanceCtx }}-config
  namespace: {{ include "siprec-stack.namespace" $root }}
  labels:
    {{- include "siprec.labels" $root | nindent 4 }}
    siprec-stack/recorder-instance: {{ include "siprec.instanceName" $instance | quote }}
data:
  config.yaml: |
    # SIPREC recorder configuration -- managed by Helm.
    sip_listen_addr: "{{ $root.Values.siprecRecorder.config.sipListenAddr }}"

    # This instance's internal passthrough NLB VIP is advertised in SDP.
    media_ip: "{{ required (printf "siprecRecorder.instances[%d].loadBalancerIP is required" $index) $instance.loadBalancerIP }}"

    # The application allocates even RTP ports from this inclusive range.
    rtp_port_start: {{ $root.Values.siprecRecorder.config.rtpPortStart }}
    rtp_port_end:   {{ $root.Values.siprecRecorder.config.rtpPortEnd }}

    recording_dir: "{{ $root.Values.siprecRecorder.config.recordingDir }}"

{{ if $root.Values.siprecRecorder.gcp.credentialsSecret.name }}
    gcp_credentials_file: "/var/secrets/google/{{ $root.Values.siprecRecorder.gcp.credentialsSecret.key }}"
{{ else }}
    gcp_credentials_file: ""
{{ end }}

    gcs_bucket:        "{{ $root.Values.siprecRecorder.config.gcsBucket }}"
    gcs_object_prefix: "{{ $root.Values.siprecRecorder.config.gcsObjectPrefix }}"

    gcs_metadata_bucket:        "{{ $root.Values.siprecRecorder.config.gcsMetadataBucket }}"
    gcs_metadata_object_prefix: "{{ $root.Values.siprecRecorder.config.gcsMetadataObjectPrefix }}"

    delete_after_upload: {{ $root.Values.siprecRecorder.config.deleteAfterUpload }}
    upload_workers:      {{ $root.Values.siprecRecorder.config.uploadWorkers }}
    upload_max_retries:  {{ $root.Values.siprecRecorder.config.uploadMaxRetries }}
    upload_sweep_interval_sec:   {{ $root.Values.siprecRecorder.config.uploadSweepIntervalSec }}
    shutdown_upload_timeout_sec: {{ $root.Values.siprecRecorder.config.shutdownUploadTimeoutSec }}
{{ end }}
