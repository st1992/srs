{{- $root := . }}
{{ range $index, $node := $root.Values.siprecRecorder.nodes }}
{{ $nodeCtx := dict "root" $root "node" $node }}
{{ if $index }}
---
{{ end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "siprec.nodeFullname" $nodeCtx }}
  namespace: {{ include "siprec-stack.namespace" $root }}
  labels:
    {{- include "siprec.labels" $root | nindent 4 }}
    siprec-stack/recorder-node: {{ include "siprec.nodeName" $node | quote }}
  annotations:
    siprec-stack/role: "siprec-recorder"
    siprec-stack/scaling: "one-daemonset-per-recorder-node"
spec:
  selector:
    matchLabels:
      {{- include "siprec.nodeSelectorLabels" $nodeCtx | nindent 6 }}

  updateStrategy:
    type: {{ $root.Values.siprecRecorder.updateStrategy.type }}
    {{- if eq $root.Values.siprecRecorder.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ $root.Values.siprecRecorder.updateStrategy.rollingUpdate.maxUnavailable }}
    {{- end }}

  template:
    metadata:
      labels:
        {{- include "siprec.labels" $root | nindent 8 }}
        siprec-stack/recorder-node: {{ include "siprec.nodeName" $node | quote }}
      annotations:
        # Restart pods when config.yaml changes.
        checksum/siprec-config: {{ printf "%s:%s:%s" (toJson $root.Values.siprecRecorder.config) (required (printf "siprecRecorder.nodes[%d].loadBalancerIP is required" $index) $node.loadBalancerIP) (toJson $root.Values.siprecRecorder.gcp.credentialsSecret) | sha256sum }}
    spec:
      # ── Node placement ────────────────────────────────────────────────────
      # Schedule on every node matching the configured machine type.
      nodeSelector:
{{ with $root.Values.siprecRecorder.nodeSelector }}
{{ toYaml . | nindent 8 }}
{{ end }}
      {{- with $root.Values.siprecRecorder.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ── GCP identity ──────────────────────────────────────────────────────
      # The ServiceAccount provides Workload Identity (Option A) or is simply
      # required when mounting a credentials Secret (Option B).
      serviceAccountName: {{ include "siprec.serviceAccountName" $root }}

      # ── Host network ──────────────────────────────────────────────────────
      # RTP media is sent directly to/from the node's IP without any NAT or
      # port-mapping overhead.  SIP signalling arrives via the Internal
      # Passthrough NLB Service (externalTrafficPolicy: Local) on UDP/5060
      # which the pod also binds on the node IP via hostNetwork.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # Allow ongoing RTP sessions and in-flight GCS uploads to finish cleanly
      # before the pod is force-killed.
      terminationGracePeriodSeconds: 60

      # ── Security context ──────────────────────────────────────────────────
      # The recorder runs as the non-root "siprec" user (UID/GID 1000) defined
      # in the Dockerfile.  Binding port 5060 requires NET_BIND_SERVICE when
      # the port number is < 1024; the container image must set this or the
      # sip_listen_addr should use a port ≥ 1024 instead.
      securityContext:
        runAsNonRoot: false   # Keep false; CAP_NET_BIND_SERVICE requires root or cap

      # ── Init container: fix hostPath recordings directory ownership ────────
      # The kubelet creates the hostPath directory as root:root (mode 755).
      # This init container runs as root and makes the directory world-writable
      # so the non-root siprec user can create recording files inside it.
      initContainers:
        - name: fix-recordings-permissions
          image: busybox:1.35
          command:
            - /bin/sh
            - -c
            - chmod 0777 /mnt/recordings
          volumeMounts:
            - name: recordings
              mountPath: /mnt/recordings
          securityContext:
            runAsUser: 0

      containers:
        - name: siprec-recorder
          image: "{{ $root.Values.siprecRecorder.image.repository }}:{{ $root.Values.siprecRecorder.image.tag }}"
          imagePullPolicy: {{ $root.Values.siprecRecorder.image.pullPolicy }}

          # ── Resource claim ────────────────────────────────────────────────
          # requests should be close to the node's total allocatable capacity
          # so the Kubernetes scheduler treats the node as fully committed and
          # avoids co-scheduling other pods.  limits may match node capacity.
          #
          # Tune via values.yaml:
          #   siprecRecorder.resources.requests.cpu / memory
          #   siprecRecorder.resources.limits.cpu   / memory
          resources:
            {{- toYaml $root.Values.siprecRecorder.resources | nindent 12 }}

          ports:
            - name: sip-udp
              containerPort: 5060
              hostPort: 5060
              protocol: UDP

            # RTP range — declared here for documentation; Kubernetes does not
            # map large ranges in Service objects, but with hostNetwork=true
            # the ports are directly accessible on the node IP.
            - name: rtp-start
              containerPort: {{ $root.Values.siprecRecorder.config.rtpPortStart }}
              hostPort: {{ $root.Values.siprecRecorder.config.rtpPortStart }}
              protocol: UDP

          # ── Health probes ──────────────────────────────────────────────────
          # Uses only POSIX tools available in the minimal Alpine image;
          # matches the HEALTHCHECK defined in the Dockerfile.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "kill -0 1 && grep -q siprec-recorder /proc/1/cmdline"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "kill -0 1 && grep -q siprec-recorder /proc/1/cmdline"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: siprec-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Durable recording staging area — backed by a host path so that
            # recordings survive pod restarts and can be re-uploaded on next start.
            - name: recordings
              mountPath: /app/recordings
            {{- if $root.Values.siprecRecorder.gcp.credentialsSecret.name }}
            # Option B: JSON key mounted from a Kubernetes Secret.
            - name: gcp-credentials
              mountPath: /var/secrets/google
              readOnly: true
            {{- end }}

      volumes:
        - name: siprec-config
          configMap:
            name: {{ include "siprec.nodeFullname" $nodeCtx }}-config
        - name: recordings
          hostPath:
            # Created automatically by the kubelet if it does not exist.
            path: {{ $root.Values.siprecRecorder.recordingsHostPath }}
            type: DirectoryOrCreate
        {{- if $root.Values.siprecRecorder.gcp.credentialsSecret.name }}
        # Option B: Secret volume — created separately by the operator:
        #   kubectl create secret generic <name> --from-file=key.json=./sa-key.json
        - name: gcp-credentials
          secret:
            secretName: {{ $root.Values.siprecRecorder.gcp.credentialsSecret.name }}
        {{- end }}
{{ end }}
