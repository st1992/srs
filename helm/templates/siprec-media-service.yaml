{{- if .Values.siprecRecorder.mediaService.enabled }}
{{- $portStart := int .Values.siprecRecorder.config.rtpPortStart -}}
{{- $portEnd   := int .Values.siprecRecorder.config.rtpPortEnd -}}
{{- if lt $portEnd $portStart -}}
{{- fail (printf "siprecRecorder.config.rtpPortEnd (%d) must be >= rtpPortStart (%d)" $portEnd $portStart) -}}
{{- end -}}
{{- $portCount := add (sub $portEnd $portStart) 1 -}}
{{- if gt $portCount 250 -}}
{{- fail (printf "RTP port range too large for a single Service (%d ports). GKE Service objects can hold at most ~250 ports; either narrow rtpPortStart/rtpPortEnd or shard into multiple Services. See helm/values.yaml comments on mediaService for guidance." $portCount) -}}
{{- end -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "siprec.fullname" . }}-media
  namespace: {{ include "siprec-stack.namespace" . }}
  labels:
    {{- include "siprec.labels" . | nindent 4 }}
  annotations:
    # Sharing the VIP with the kamailio Service via the
    # internal-load-balancer-shared-vip annotation. GCP renders this as a
    # second forwarding rule on the same Internal Passthrough NLB,
    # targeting the recorder DaemonSet's nodes for the RTP port range.
    siprec-stack/purpose: "rtp-media-ingress-via-shared-vip-nlb"
    {{- with .Values.siprecRecorder.mediaService.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.siprecRecorder.mediaService.type }}
  {{- if and (eq .Values.siprecRecorder.mediaService.type "LoadBalancer") .Values.siprecRecorder.mediaService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.siprecRecorder.mediaService.loadBalancerIP | quote }}
  {{- end }}
  # Preserve the real SBC source IP and skip the kube-proxy SNAT hop so
  # RTP packets arrive at the recorder pod with the original SBC address
  # in the UDP header. Required for any source-IP-based ACLs and for
  # correct symmetry of the RTP flow.
  externalTrafficPolicy: Local
  selector:
    {{- include "siprec.selectorLabels" . | nindent 4 }}
  # Kubernetes Service objects do NOT support UDP port ranges, so each
  # port in rtpPortStart…rtpPortEnd is enumerated explicitly below. The
  # GCP forwarding rule that backs this Service ends up covering exactly
  # these ports — anything outside the list is silently dropped by the NLB.
  ports:
    {{- range $i, $_ := until (int $portCount) }}
    {{- $port := add $portStart $i }}
    - name: rtp-{{ $port }}
      protocol: UDP
      port: {{ $port }}
      targetPort: {{ $port }}
    {{- end }}
{{- end }}
