apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kamailio.fullname" . }}
  namespace: {{ include "siprec-stack.namespace" . }}
  labels:
    {{- include "kamailio.labels" . | nindent 4 }}
  annotations:
    # Describes the intended operational model in plain text for operators.
    siprec-stack/role: "siprec-proxy"
    siprec-stack/scaling: "fixed-single-replica"
spec:
  # ── Single replica — never scale this up.  Two simultaneous Kamailio
  # instances sharing the same host-network port 5060 would conflict.
  replicas: 1

  # Recreate ensures the old pod is fully terminated before the new one
  # starts (avoids host-port conflicts during rolling updates).
  strategy:
    type: Recreate

  selector:
    matchLabels:
      {{- include "kamailio.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "kamailio.labels" . | nindent 8 }}
      annotations:
        # Force a pod replacement whenever kamailio.cfg changes.
        checksum/kamailio-config: {{ include (print $.Template.BasePath "/kamailio-configmap.yaml") . | sha256sum }}
    spec:
      # ── Node placement ────────────────────────────────────────────────────
      # Kamailio runs on its own dedicated node (labelled siprec-role=kamailio).
      # The taint keeps all other workloads off that node.
      nodeSelector:
        {{- toYaml .Values.kamailio.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.kamailio.tolerations | nindent 8 }}

      # ── Host network ──────────────────────────────────────────────────────
      # SIP traffic arrives on the bare node IP:5060 without any NAT.
      # The pod inherits all host network interfaces.
      hostNetwork: true

      # With hostNetwork, DNS must be explicitly set to use the cluster resolver.
      dnsPolicy: ClusterFirstWithHostNet

      # Allow in-flight SIP dialogs to drain before SIGKILL.
      terminationGracePeriodSeconds: 60

      # ── Init container: populate dispatcher.list ──────────────────────────
      # Queries the headless SIPREC recorder Service via DNS, resolves individual
      # pod IPs, and writes them into /dispatcher/dispatcher.list in the format
      # expected by Kamailio's dispatcher module:
      #
      #   1 sip:<pod-ip>:5060 0 0
      #
      # The emptyDir volume /dispatcher is then mounted into the Kamailio
      # container at /etc/kamailio/dispatcher.list (via subPath).
      #
      # If no recorder pods are ready yet, Kamailio starts with an empty list
      # and returns 503 until the dispatcher's OPTIONS health-checks mark pods
      # as active.  Restart the Kamailio pod after adding new recorder nodes to
      # refresh the list.
      initContainers:
        - name: gen-dispatcher-list
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add --no-cache bind-tools > /dev/null 2>&1

              HEADLESS_SVC="{{ include "siprec.headlessServiceName" . }}.{{ include "siprec-stack.namespace" . }}.svc.cluster.local"
              echo "Resolving SIPREC recorder pod IPs from: $HEADLESS_SVC"

              ATTEMPTS=0
              # Ensure a valid (possibly empty) file always exists so Kamailio
              # can start even when no recorders are scheduled yet.
              : > /dispatcher/dispatcher.list

              until dig +short "$HEADLESS_SVC" A > /tmp/resolved_ips.txt 2>/dev/null \
                    && [ -s /tmp/resolved_ips.txt ]; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ "$ATTEMPTS" -ge 20 ]; then
                  echo "WARNING: No recorder pods resolved after 20 attempts."
                  echo "         Kamailio will start with an empty dispatcher list."
                  echo "         It will return 503 until recorders come online."
                  exit 0
                fi
                echo "  Waiting for recorder pods ($ATTEMPTS/20) ..."
                sleep 5
              done

              awk '{print "1 sip:" $1 ":5060 0 0"}' /tmp/resolved_ips.txt \
                > /dispatcher/dispatcher.list

              ENTRY_COUNT=$(wc -l < /dispatcher/dispatcher.list)
              echo "dispatcher.list populated with $ENTRY_COUNT recorder(s):"
              cat /dispatcher/dispatcher.list
          volumeMounts:
            - name: dispatcher
              mountPath: /dispatcher

      containers:
        - name: kamailio
          image: "{{ .Values.kamailio.image.repository }}:{{ .Values.kamailio.image.tag }}"
          imagePullPolicy: {{ .Values.kamailio.image.pullPolicy }}

          # Run Kamailio in the foreground so the container's PID 1 is the
          # actual Kamailio process:
          #   -DD : do-not-fork (stay attached to the controlling terminal)
          #   -E  : log to stderr (kubectl logs sees everything)
          #   -f  : explicit config path
          command: ["kamailio"]
          args:
            - "-DD"
            - "-E"
            - "-f"
            - "/etc/kamailio/kamailio.cfg"

          # hostNetwork shares the host ports; declaring them here is
          # informational and enables hostPort mapping for kube-proxy awareness.
          ports:
            - name: sip-udp
              containerPort: 5060
              hostPort: 5060
              protocol: UDP
            - name: sip-tcp
              containerPort: 5060
              hostPort: 5060
              protocol: TCP

          resources:
            {{- toYaml .Values.kamailio.resources | nindent 12 }}

          # ── Health probes ──────────────────────────────────────────────────
          # Verify UDP 5060 is bound by reading /proc/net/udp directly.
          # This avoids depending on `ss` / `netstat` being present in the image.
          # 13C4 is hex(5060); column 2 is the local address:port.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "grep -qE ':13C4 ' /proc/net/udp"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "grep -qE ':13C4 ' /proc/net/udp"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            # kamailio.cfg from ConfigMap
            - name: kamailio-config
              mountPath: /etc/kamailio/kamailio.cfg
              subPath: kamailio.cfg
              readOnly: true
            # dispatcher.list written by the init-container
            - name: dispatcher
              mountPath: /etc/kamailio/dispatcher.list
              subPath: dispatcher.list

      volumes:
        - name: kamailio-config
          configMap:
            name: {{ include "kamailio.fullname" . }}-config
        # Shared between gen-dispatcher-list (writer) and kamailio (reader).
        - name: dispatcher
          emptyDir: {}
