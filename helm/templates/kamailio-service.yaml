apiVersion: v1
kind: Service
metadata:
  name: {{ include "kamailio.fullname" . }}
  namespace: {{ include "siprec-stack.namespace" . }}
  labels:
    {{- include "kamailio.labels" . | nindent 4 }}
  {{- with .Values.kamailio.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.kamailio.service.type }}
  # externalTrafficPolicy: Local preserves the real source IP of SIP packets
  # and avoids an extra hop through kube-proxy on a different node.
  # Only valid for LoadBalancer / NodePort service types.
  {{- if or (eq .Values.kamailio.service.type "LoadBalancer") (eq .Values.kamailio.service.type "NodePort") }}
  externalTrafficPolicy: Local
  {{- end }}
  selector:
    {{- include "kamailio.selectorLabels" . | nindent 4 }}
  ports:
    # SIP signalling — UDP is the primary transport for SIPREC.
    - name: sip-udp
      port: {{ .Values.kamailio.service.port }}
      targetPort: sip-udp
      protocol: UDP
    # SIP over TCP (required by some SBCs and WebRTC gateways).
    - name: sip-tcp
      port: {{ .Values.kamailio.service.port }}
      targetPort: sip-tcp
      protocol: TCP
