{{- $root := . }}
{{- $instanceNames := dict }}
{{- range $index, $instance := $root.Values.siprecRecorder.instances }}
{{- $instanceName := include "siprec.instanceName" $instance }}
{{- if hasKey $instanceNames $instanceName }}
{{- fail (printf "siprecRecorder.instances[%d].name normalizes to duplicate name %q" $index $instanceName) }}
{{- end }}
{{- $_ := set $instanceNames $instanceName true }}
{{- end }}
{{ range $index, $instance := $root.Values.siprecRecorder.instances }}
{{ $instanceCtx := dict "root" $root "instance" $instance }}
{{ if $index }}
---
{{ end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "siprec.instanceFullname" $instanceCtx }}
  namespace: {{ include "siprec-stack.namespace" $root }}
  labels:
    {{- include "siprec.labels" $root | nindent 4 }}
    siprec-stack/recorder-instance: {{ include "siprec.instanceName" $instance | quote }}
  annotations:
    siprec-stack/purpose: "siprec-recorder-loadbalancer"
    siprec-stack/recorder-instance: {{ include "siprec.instanceName" $instance | quote }}
{{ with $root.Values.siprecRecorder.service.annotations }}
{{ toYaml . | nindent 4 }}
{{ end }}
spec:
  type: {{ $root.Values.siprecRecorder.service.type }}
{{ if eq $root.Values.siprecRecorder.service.type "LoadBalancer" }}
  loadBalancerIP: {{ required (printf "siprecRecorder.instances[%d].loadBalancerIP is required" $index) $instance.loadBalancerIP | quote }}
{{ with $root.Values.siprecRecorder.service.loadBalancerClass }}
  loadBalancerClass: {{ . | quote }}
{{ end }}
{{ with $root.Values.siprecRecorder.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{ toYaml . | nindent 4 }}
{{ end }}
  # Preserve the client address and make only nodes with this instance's Ready
  # pod eligible as backends. Different instance VIPs can select pods on the
  # same node.
  externalTrafficPolicy: Local
{{ end }}
  selector:
    {{- include "siprec.instanceSelectorLabels" $instanceCtx | nindent 4 }}
  ports:
    - name: sip-udp
      port: {{ $root.Values.siprecRecorder.service.port }}
      targetPort: sip-udp
      protocol: UDP
{{ end }}
