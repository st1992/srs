{{- $root := . }}
{{ range $index, $node := $root.Values.siprecRecorder.nodes }}
{{ $nodeCtx := dict "root" $root "node" $node }}
{{ if $index }}
---
{{ end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "siprec.nodeFullname" $nodeCtx }}
  namespace: {{ include "siprec-stack.namespace" $root }}
  labels:
    {{- include "siprec.labels" $root | nindent 4 }}
    siprec-stack/recorder-node: {{ include "siprec.nodeName" $node | quote }}
  annotations:
    # GKE Internal Passthrough Network Load Balancer (L4) fronting the SIPREC
    # recorder pod for this configured node directly. SBCs send SIP INVITEs to
    # this node's LB VIP on UDP/5060; the LB forwards passthrough traffic only
    # to the node with the matching Ready pod.
    siprec-stack/purpose: "siprec-recorder-node-loadbalancer"
    siprec-stack/recorder-node: {{ include "siprec.nodeName" $node | quote }}
{{ with $root.Values.siprecRecorder.service.annotations }}
{{ toYaml . | nindent 4 }}
{{ end }}
spec:
  type: {{ $root.Values.siprecRecorder.service.type }}
{{ if eq $root.Values.siprecRecorder.service.type "LoadBalancer" }}
  # Pin this node's internal LB to its pre-reserved VPC IP. The same VIP should
  # also front the node's RTP media path (UDP rtpPortStart–rtpPortEnd) through
  # an out-of-band GCP forwarding rule.
  loadBalancerIP: {{ required (printf "siprecRecorder.nodes[%d].loadBalancerIP is required" $index) $node.loadBalancerIP | quote }}
{{ end }}
  # externalTrafficPolicy: Local makes GCP skip SNAT so the real SBC source
  # IP reaches the recorder pod, and only nodes with a Ready pod receive
  # traffic. Since this Service selects one node's pod, only that node should
  # become a healthy backend.
  externalTrafficPolicy: Local
  selector:
    {{- include "siprec.nodeSelectorLabels" $nodeCtx | nindent 4 }}
  ports:
    - name: sip-udp
      port: {{ $root.Values.siprecRecorder.service.port }}
      targetPort: sip-udp
      protocol: UDP
{{ end }}
