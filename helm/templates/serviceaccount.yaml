apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "recorder.serviceAccountName" . }}
  namespace: {{ include "streamlink.namespace" . }}
  labels:
    {{- include "recorder.labels" . | nindent 4 }}
  {{- if .Values.recorder.gcp.workloadIdentity.gcpServiceAccount }}
  annotations:
    # Workload Identity binding — links this Kubernetes ServiceAccount to the
    # GCP IAM Service Account so that pods can call GCS without a key file.
    iam.gke.io/gcp-service-account: {{ .Values.recorder.gcp.workloadIdentity.gcpServiceAccount | quote }}
  {{- end }}
