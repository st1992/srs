apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxy.fullname" . }}
  namespace: {{ include "streamlink.namespace" . }}
  labels:
    {{- include "proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.proxy.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxy.labels" . | nindent 8 }}
      annotations:
        checksum/proxy-config: {{ include (print $.Template.BasePath "/proxy-configmap.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- with .Values.proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cx-streamlink-proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          command:
            - kamailio
          args:
            - -DD
            - -E
            - -f
            - /etc/kamailio/kamailio.cfg
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
          ports:
            - name: sip-udp
              containerPort: {{ .Values.proxy.service.port }}
              protocol: UDP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "kill -0 1"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "kill -0 1"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/kamailio/kamailio.cfg
              subPath: proxy.cfg
              readOnly: true
            - name: proxy-config
              mountPath: /etc/kamailio/dispatcher.list
              subPath: dispatcher.list
              readOnly: true
      volumes:
        - name: proxy-config
          configMap:
            name: {{ include "proxy.fullname" . }}-config
