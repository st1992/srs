apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kamailio.fullname" . }}-config
  namespace: {{ include "siprec-stack.namespace" . }}
  labels:
    {{- include "kamailio.labels" . | nindent 4 }}
data:
  # ── kamailio.cfg ────────────────────────────────────────────────────────────
  # SIPREC Proxy configuration.
  #
  # Responsibility:
  #   • Accept inbound SIPREC INVITE from SBCs / call controllers on UDP/TCP 5060.
  #   • Insert Record-Route so all in-dialog messages (re-INVITE, BYE) return
  #     through this proxy.
  #   • Dispatch new calls round-robin across healthy SIPREC recorder pods
  #     (dispatcher set 1).  Automatically fails over to the next recorder on
  #     5xx or timeout.
  #   • Keep the in-dialog route pinned: once a call lands on recorder pod X,
  #     all subsequent transactions for that dialog go to pod X (via the Route
  #     set written by record_route).
  #
  # dispatcher.list is written at pod startup by the gen-dispatcher-list
  # init-container, which resolves the headless Service DNS to individual pod IPs.
  # ────────────────────────────────────────────────────────────────────────────
  kamailio.cfg: |
    #!KAMAILIO

    ####### Global Parameters #########

    debug=2
    log_stderror=yes
    log_facility=LOG_LOCAL0

    # Suppress the "Server: kamailio (<ver>)" header in locally-generated
    # replies (e.g. 100 Trying, 200 OK to OPTIONS, error responses). Avoids
    # leaking the proxy software/version to upstream SBCs.
    server_signature=no
    server_header="Server:"
    user_agent_header="User-Agent:"

    # Run in the foreground; container runtime handles process supervision.
    # fork=no keeps PID 1 attached so Kubernetes sees the real Kamailio process
    # and SIGTERM is delivered correctly during pod termination.
    fork=no
    children={{ .Values.kamailio.children }}

    # With hostNetwork=true the pod inherits the node's interfaces;
    # 0.0.0.0 binds on every address present on the node.
    # Bind on all node interfaces but advertise a single, stable address in
    # Via / Record-Route / Contact so upstream SBCs always route in-dialog
    # traffic back to the LoadBalancer VIP regardless of which node IP the
    # kernel picks as source.
    listen=udp:0.0.0.0:5060 advertise {{ .Values.kamailio.advertiseAddress }}:5060
    listen=tcp:0.0.0.0:5060 advertise {{ .Values.kamailio.advertiseAddress }}:5060

    # Global default for Via / Record-Route / Contact in locally-generated
    # messages (100 Trying, OPTIONS replies, dispatcher pings, error
    # responses). `listen … advertise` only affects messages routed out
    # that specific socket; advertised_address covers everything else and
    # guarantees in-dialog traffic always returns to the LB VIP.
    advertised_address="{{ .Values.kamailio.advertiseAddress }}"
    advertised_port=5060

    # Recognise the advertise address as "myself" so loose_route() will pop
    # Route headers that point at the VIP (bind addr is 0.0.0.0, which
    # would otherwise fail the myself check).
    alias=udp:{{ .Values.kamailio.advertiseAddress }}:5060
    alias=tcp:{{ .Values.kamailio.advertiseAddress }}:5060

    ####### Modules ########

    mpath="{{ .Values.kamailio.modulePath }}"

    loadmodule "tm.so"
    loadmodule "sl.so"
    loadmodule "rr.so"
    loadmodule "pv.so"
    loadmodule "maxfwd.so"
    loadmodule "textops.so"
    loadmodule "xlog.so"
    loadmodule "sanity.so"
    loadmodule "siputils.so"
    loadmodule "kex.so"
    loadmodule "dispatcher.so"

    # ── tm ──────────────────────────────────────────────────────────────────
    modparam("tm", "failure_reply_mode", 3)
    modparam("tm", "fr_timer",           30000)
    modparam("tm", "fr_inv_timer",       120000)

    # ── rr ──────────────────────────────────────────────────────────────────
    modparam("rr", "enable_full_lr",  1)
    modparam("rr", "append_fromtag",  1)

    # ── dispatcher ──────────────────────────────────────────────────────────
    # dispatcher.list layout:
    #   <set-id> sip:<pod-ip>:5060 <flags> <priority>
    # Populated by the gen-dispatcher-list init-container at pod startup.
    modparam("dispatcher", "list_file",             "/etc/kamailio/dispatcher.list")
    modparam("dispatcher", "ds_ping_method",        "OPTIONS")
    modparam("dispatcher", "ds_ping_interval",      30)
    # ds_probing_mode 1 = probe only destinations marked inactive
    modparam("dispatcher", "ds_probing_mode",       1)
    modparam("dispatcher", "ds_probing_threshold",  3)
    modparam("dispatcher", "ds_inactive_threshold", 3)
    # Accept 2xx, 403, 480, 484 as "alive" responses to OPTIONS pings
    modparam("dispatcher", "ds_ping_reply_codes",   "class=2;code=403;code=480;code=484")
    modparam("dispatcher", "ds_timer_mode",         1)

    ####### Routing Logic ########

    request_route {
        t_check_trans();

        # ── Max-Forwards guard ────────────────────────────────────────────
        if (!mf_process_maxfwd_header(10)) {
            sl_send_reply("483", "Too Many Hops");
            exit;
        }

        # ── Sanity check ──────────────────────────────────────────────────
        if (!sanity_check("17895", "7")) {
            xlog("L_ERR", "Malformed SIP message from $si:$sp — discarding\n");
            exit;
        }

        # ── CANCEL follows existing transaction ───────────────────────────
        if (is_method("CANCEL")) {
            if (t_check_trans()) { route(RELAY); }
            exit;
        }

        # ── In-dialog requests (re-INVITE, BYE, ACK for 2xx, …) ──────────
        # loose_route() pops this proxy's address from the Route set and
        # sets the next-hop to the recorder's Contact URI, keeping the call
        # pinned to whichever recorder handled the initial INVITE.
        if (has_totag()) {
            if (loose_route()) {
                route(RELAY);
                exit;
            }

            # ACK for a non-2xx final response — only relay it if it
            # matches an existing transaction. We MUST NOT fall through
            # to a blind route(RELAY) here: if loose_route() failed it
            # means there is no Route header to pop, so the RURI is
            # likely our own advertise address (some SBCs collapse a
            # single Record-Route into the Request-URI). Forwarding
            # such an ACK would just send it back to ourselves and
            # create an infinite loop, accumulating a Via on each pass
            # until Max-Forwards expires.
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    route(RELAY);
                }
                exit;
            }

            sl_send_reply("404", "Not Found");
            exit;
        }

        # ── OPTIONS directed at this proxy (health-check by LB / SBC) ────
        if (is_method("OPTIONS") && uri==myself) {
            sl_send_reply("200", "OK");
            exit;
        }

        # ── New SIPREC INVITE ─────────────────────────────────────────────
        # Pick a recorder, pin the outbound socket to the VIP, THEN insert
        # the Record-Route. Order matters: record_route() snapshots the
        # currently-selected send socket into the RR URI. If we call it
        # before force_send_socket(), the RR may be stamped with the
        # node's primary interface address instead of the VIP, breaking
        # in-dialog routing back through the LB.
        if (is_method("INVITE")) {
            if (!ds_select_dst("1", "4", "1")) {
                xlog("L_ERR", "dispatcher: no live recorder available for session $ci\n");
                sl_send_reply("503", "Service Unavailable — no recorders available");
                exit;
            }
            force_send_socket(udp:{{ .Values.kamailio.advertiseAddress }}:5060);
            record_route();
            xlog("L_INFO", "SIPREC session $ci dispatched to recorder $du\n");
            t_on_failure("RECORDER_FAILOVER");
            route(RELAY);
            exit;
        }

        sl_send_reply("405", "Method Not Allowed");
    }

    route[RELAY] {
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
    }

    onreply_route { exit; }

    # ── Failover: try next healthy recorder on 5xx or timeout ────────────────
    failure_route[RECORDER_FAILOVER] {
        if (t_is_canceled()) { exit; }

        if (t_check_status("(5[0-9][0-9]|408)")) {
            if (ds_next_dst()) {
                xlog("L_WARN", "Failover: retrying session $ci on next recorder $du\n");
                t_on_failure("RECORDER_FAILOVER");
                route(RELAY);
                exit;
            }
            xlog("L_ERR", "All recorders exhausted for session $ci — returning 503\n");
        }
    }
